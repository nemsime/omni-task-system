services:
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: task-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: task-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taskdb
      REDIS_URL: redis://redis:6379
      PORT: "5000"
      BOT_TOKEN: ${BOT_TOKEN}
      # The standalone `worker` service owns voice transcription in this
      # compose setup, so the embedded one is disabled to avoid two
      # consumers competing for the same queue.
      ENABLE_VOICE_WORKER: "false"
      CORS_ORIGIN: http://localhost:8080
      TELEGRAM_POLLING: "true"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    container_name: task-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        # The browser will hit the backend on localhost:5000 (host-mapped).
        VITE_API_URL: http://localhost:5000
        VITE_BASE_PATH: /
    container_name: task-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
