name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs so a deploy
# can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set this as a repo variable (Settings -> Secrets and variables ->
          # Actions -> Variables) once you have a publicly-reachable backend.
          # If unset, the app falls back to http://localhost:5000.
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Debug — list dist contents
        run: |
          echo "::group::frontend/dist tree"
          ls -laR dist || echo "NO DIST DIRECTORY"
          echo "::endgroup::"
          echo "::group::frontend/dist/index.html"
          cat dist/index.html || echo "NO index.html"
          echo "::endgroup::"
          echo "::group::dist size"
          du -sh dist || true
          echo "::endgroup::"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
